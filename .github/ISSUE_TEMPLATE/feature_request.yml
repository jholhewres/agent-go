name: Feature Request
description: Suggest a new feature or enhancement for agent-go
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
        Please describe the problem you're trying to solve and your proposed
        approach so we can discuss the best way forward.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Link to related issues if applicable.
      placeholder: "Currently, there is no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've tried.
    validations:
      required: false

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: A concrete example of how you would use this feature.
    validations:
      required: true

  - type: dropdown
    id: contribution
    attributes:
      label: Are you willing to contribute?
      description: Let us know if you'd like to help implement this feature.
      options:
        - "Yes, I can submit a PR"
        - "Yes, with guidance"
        - "No, but I can help with testing"
        - "No"
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct.
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
