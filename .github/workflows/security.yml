name: Security Scanning

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  gosec:
    name: Gosec Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: >-
            -exclude-dir=cmd/examples
            -exclude-dir=website
            -fmt=sarif
            -out=gosec.sarif
            -no-fail
            ./...

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif

  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          # Use the minimum Go declared in go.mod so the scan reflects
          # what CI actually ships with. Must be >= 1.25 (earlier 1.24.x
          # patches have standard-library CVEs in os and crypto/x509).
          go-version-file: go.mod
