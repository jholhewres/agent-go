name: Deploy VitePress Docs to GitHub Pages

# NOTE: This workflow requires GitHub Pages to be enabled manually in
# repository Settings -> Pages -> "Build and deployment" source set to
# "GitHub Actions". The default GITHUB_TOKEN cannot auto-provision Pages
# on the first run (it lacks the admin:repo scope), so pushing with
# Pages still disabled produces a red CI check. Until Pages is enabled,
# this workflow only runs on manual dispatch — re-enable the push
# trigger once the site is live.
on:
  workflow_dispatch:
  # Re-enable after Pages is turned on in repo settings:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'website/**'
  #     - 'package.json'
  #     - '.github/workflows/deploy-docs.yml'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Needed for lastUpdated feature

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build VitePress site
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: website/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
