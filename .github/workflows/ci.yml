name: Go CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: go-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Pin the floor to the minimum non-vulnerable Go and also cover
        # the latest stable so regressions show up early.
        go-version: ["1.24.4", "stable"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go${{ matrix.go-version }}-gomod-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go${{ matrix.go-version }}-gomod-

      - name: Download dependencies
        run: go mod download

      - name: Install tooling
        run: make install-tools

      - name: Run vet
        run: go vet ./...

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-${{ matrix.go-version }}
          path: coverage.txt

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage.txt
          fail_ci_if_error: false
