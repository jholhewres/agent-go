# golangci-lint config for agent-go.
# https://golangci-lint.run/usage/configuration/
#
# We run the default linter set plus a handful of opinionated picks. The
# main purpose of this file is to relax `errcheck` for test files and
# for a few idiomatic "best-effort" call patterns in production code
# (tx.Rollback in defers, fire-and-forget SSE writes) while keeping the
# linter strict everywhere else.

run:
  timeout: 10m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell

issues:
  # golangci-lint ships with a default set of exclusions that hide a few
  # real issues; we want to see them, so opt back in.
  exclude-use-default: false

  # Cap reported issues from the same linter/file so we don't spam PRs.
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Test files often ignore errors on cleanup helpers (Disconnect,
    # Stop, Rollback, Close, Chdir back to the original dir, etc.).
    # These aren't production correctness issues, so relax errcheck for
    # all *_test.go files.
    - path: _test\.go
      linters:
        - errcheck

    # `tx.Rollback()` inside a defer after a committed/failed Begin is
    # the canonical Go pattern — the rollback return value is allowed
    # to surface whichever error it wants, and the caller intentionally
    # ignores it because the transaction has already completed one way
    # or the other.
    - linters: [errcheck]
      text: "Error return value of `(.+\\.)?Rollback` is not checked"

    # Server-Sent Events writes are fire-and-forget: if the client
    # disconnects mid-stream the writer will error, but there is
    # nothing meaningful the handler can do with that error.
    - linters: [errcheck]
      text: "Error return value of `.+\\.sendSSE` is not checked"

    # Resource cleanup via `defer <resource>.Close()` is the canonical
    # Go idiom — the close error is almost always ignored on purpose
    # because the interesting error came from whatever operated on the
    # resource before it was closed. This covers rows.Close, stmt.Close,
    # resp.Body.Close, file.Close, stdin.Close, etc.
    - linters: [errcheck]
      text: "Error return value of `.+\\.Close` is not checked"

    # Best-effort write helpers in workflow persistence: the workflow
    # run itself has already completed by the time we call saveRun /
    # saveCancellation, and a failed persistence attempt is logged
    # inside those helpers. Surfacing the error to the caller would
    # not change control flow.
    - linters: [errcheck]
      text: "Error return value of `.+\\.saveRun` is not checked"
    - linters: [errcheck]
      text: "Error return value of `.+\\.saveCancellation` is not checked"

    # SA5011 has well-known false positives in Go test code because
    # staticcheck cannot see that `t.Fatal` / `t.Fatalf` halt execution
    # via runtime.Goexit(); the standard testing idiom
    #
    #     if x == nil { t.Fatal("...") }
    #     use(x.Field)
    #
    # looks like a possible nil deref to the linter even though it is
    # not. Exclude the check in test files.
    - path: _test\.go
      linters: [staticcheck]
      text: "SA5011"

    # Test files often declare helper fields/types that are only used
    # indirectly via reflection or table-driven cases the linter cannot
    # track. Relax `unused` in test code to avoid false positives.
    - path: _test\.go
      linters: [unused]

    # `defer <pkg>.Remove(tempFile)` (temp-file cleanup) and similar
    # defer-based "fire once, discard error" helpers are standard Go
    # patterns. The error is only meaningful for logging, not for
    # control flow.
    - linters: [errcheck]
      text: "Error return value of `.+\\.Remove` is not checked"

    # json.Unmarshal in tight loops over database rows is commonly
    # left unchecked as a best-effort "hydrate whatever metadata you
    # can" step — the row itself is authoritative and a malformed
    # metadata blob should not fail the entire query.
    #
    # TODO(sprint-1.x): audit pgvector / gemini / deepseek unmarshal
    # paths and either handle or explicitly discard the error per-site.
    - linters: [errcheck]
      path: pkg/agentgo/vectordb/pgvector/pgvector\.go
      text: "json\\.Unmarshal"
    - linters: [errcheck]
      path: pkg/agentgo/models/(gemini|deepseek|groq|modelscope|openai)/
      text: "json\\.Unmarshal"

    # a2a SSE handlers use fmt.Fprintf to write the SSE frame format
    # directly to the response writer. A write error means the client
    # disconnected — same fire-and-forget semantics as pkg/agentos
    # sendSSE (already excluded above).
    - linters: [errcheck]
      path: pkg/agentos/a2a/
      text: "fmt\\.Fprintf"

    # Confluence and Airflow toolkits are stubs that ship helper
    # methods not yet wired to a public API. Marking them `unused`
    # would force us to delete scaffolding that is about to be filled
    # in. Revisit when the toolkits are completed.
    #
    # TODO(sprint-1.x): complete confluence/airflow toolkits and
    # remove these exclusions.
    - linters: [unused]
      path: pkg/agentgo/tools/(confluence|airflow|bitbucket)/

    # SA1019 deprecation warnings surfaced when bumping deps in v1.5.0:
    #   - lib/pq 1.12.3: pq.CopyIn is deprecated in favour of the
    #     built-in query builder (migrating means rewriting the
    #     batch insert path in pkg/agentgo/db/batch/postgres.go).
    #   - google.golang.org/api 0.274.0: google.CredentialsFromJSON
    #     is deprecated in favour of constructors that validate the
    #     credential configuration.
    # Both are pre-existing call sites that still work correctly;
    # migration is tracked for Sprint 1.x so the release pipeline
    # is not blocked on incidental refactors.
    #
    # TODO(sprint-1.x): migrate off pq.CopyIn and
    # google.CredentialsFromJSON, remove these exclusions.
    - linters: [staticcheck]
      path: pkg/agentgo/db/batch/postgres\.go
      text: "SA1019.*pq\\.CopyIn"
    - linters: [staticcheck]
      path: pkg/agentgo/tools/googlesheets/googlesheets\.go
      text: "SA1019.*CredentialsFromJSON"

    # SA4010 flags "result of append is never used", which fires on
    # test helpers that collect events into a slice purely to count or
    # iterate over — common in streaming tests where the test asserts
    # len() or the order of events. Relax in test files.
    - path: _test\.go
      linters: [staticcheck]
      text: "SA4010"
